version: "3.9"

services:
  app:
    build: .
    container_name: user-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      MONGO_URI: mongodb://mongodb:27017/ecommerce
    volumes:
      - .:/user
      - /user/node_modules
    networks:
      - backend-network

  tests:
    build: .
    command: npm test
    environment:
      MONGO_URI: mongodb://mongodb:27017/user_test
      JWT_SECRET: test_secret
    volumes:
      - .:/user
      - /user/node_modules
    profiles:
      - test
    networks:
      - backend-network

networks:
  backend-network:
    external: true